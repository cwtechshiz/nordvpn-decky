name: Build and Package Plugin

on:
  push:
    branches:
      - main
      - testing
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile React Frontend
        run: pnpm run build

      - name: Package Plugin into Zip
        run: |
          # 1. Hardcode name to nordvpn-decky
          PLUGIN_NAME="nordvpn-decky"
          echo "Packaging plugin folder and zip as: $PLUGIN_NAME"
          
          # 2. Create the temporary structured directory
          mkdir -p $PLUGIN_NAME
          
          # 3. Copy files into the directory
          cp -r dist main.py plugin.json package.json $PLUGIN_NAME/
          
          if [ -d "assets" ]; then cp -r assets $PLUGIN_NAME/; fi
          if [ -d "bin" ]; then cp -r bin $PLUGIN_NAME/; fi
          
          # 4. Compress into nordvpn-decky.zip containing the nordvpn-decky/ folder
          zip -r ${PLUGIN_NAME}.zip $PLUGIN_NAME
          
          echo "ZIP_PATH=${PLUGIN_NAME}.zip" >> $GITHUB_ENV

      - name: Save Zip as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nordvpn-decky-zip # The artifact on GitHub will download as "nordvpn-decky-zip.zip"
          path: ${{ env.ZIP_PATH }}

      - name: Upload Zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
